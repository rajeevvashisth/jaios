name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jaios
          POSTGRES_PASSWORD: jaios
          POSTGRES_DB: jaios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jaios"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://jaios:jaios@localhost:5432/jaios

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: ruff check app tests

      - name: Black --check
        working-directory: backend
        run: black --check app tests

      - name: Mypy
        working-directory: backend
        run: mypy app

      - name: Alembic upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Pytest
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        working-directory: infra/aws/terraform
        run: terraform fmt -check

      - name: Init (no backend, no real credentials needed for validate)
        working-directory: infra/aws/terraform
        run: terraform init -backend=false

      - name: Validate
        working-directory: infra/aws/terraform
        run: terraform validate
